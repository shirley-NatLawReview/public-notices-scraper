name: Scrape DHHS Public Notices

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests curl-cffi

      - name: Run DHHS scraper
        env:
          DRUPAL_URL: ${{ secrets.DRUPAL_URL }}
          DRUPAL_USER: ${{ secrets.DRUPAL_USER }}
          DRUPAL_PASS: ${{ secrets.DRUPAL_PASS }}
        run: python scraper/dhhs_scraper.py
